<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Renungan Harian</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Renungan Harian</h1>
<p id="tanggal"></p>

<div class="card">
<h2>Renungan Embun Pagi</h2>
<div id="renungan">Memuat renungan...</div>
</div>

<div class="card">
<h2>Quote Hari Ini</h2>
<div id="quote">Memuat quote...</div>
</div>

</div>

<script>

const today = new Date()

document.getElementById("tanggal").innerText =
today.toLocaleDateString("id-ID",{weekday:'long',year:'numeric',month:'long',day:'numeric'})

fetch("api.php")
.then(res => res.json())
.then(data => {

document.getElementById("renungan").innerHTML = data.renungan
document.getElementById("quote").innerHTML = data.quote

})
.catch(err=>{
document.getElementById("renungan").innerText="Gagal memuat renungan"
document.getElementById("quote").innerText="Gagal memuat quote"
})

</script>

</body>
</html>
